      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/data-analytics-engineering
  system: actuarial-platform-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: solvency-capital-model-service
  title: Solvency II Capital Model Service
  description: |
    Produces Solvency II Solvency Capital Requirement (SCR) calculations
    using the standard formula and Parasol's internal model overlays.
    Generates QRT reporting inputs for EIOPA submission and supports
    the ORSA process with scenario and stress test capabilities.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/solvency-capital-model-service
