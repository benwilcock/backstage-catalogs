# ACTUARIAL PLATFORM SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: reserving-model-service
  title: Reserving Model Service
  description: |
    Executes actuarial reserving models (chain-ladder, Bornhuetter-Ferguson,
    Cape Cod) on claims data to produce best-estimate reserves for financial
    reporting. Maintains model run history, assumption sets, and sensitivity
    analysis outputs for the actuarial sign-off process.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/reserving-model-service
  tags:
    - data-analytics
    - actuarial
