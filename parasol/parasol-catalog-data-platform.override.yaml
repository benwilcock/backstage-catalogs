# Parasol Insurance -- Data & Analytics, Platform Engineering & Compliance Domain Components
#
# Covers all microservices in:
#   data-analytics:       data-lake-system, actuarial-platform-system,
#                         ml-pipeline-system, reporting-system
#   platform-engineering: identity-access-system, api-gateway-system,
#                         observability-system, developer-platform-system
#   compliance-regulatory: regulatory-reporting-system, audit-trail-system,
#                          gdpr-compliance-system

# ===========================================================================
# DATA LAKE SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: data-ingestion-platform-service
  title: Data Ingestion Platform Service
  description: |
    Manages the ingestion of data from all Parasol operational systems into
    the enterprise data lake. Supports real-time streaming via Kafka and
    batch file ingestion via SFTP and S3. Applies schema validation, PII
    detection, and data lineage tagging at the point of ingestion.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/data-ingestion-platform-service
  tags:
    - data-analytics
    - data-lake
    - ingestion
    - kafka
    - python
  links:
    - url: https://confluence.parasol.com/display/DATA/data-ingestion-platform-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/data-ingestion-platform-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/data-analytics-engineering
  system: data-lake-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: data-catalogue-service
  title: Data Catalogue Service
  description: |
    Maintains the enterprise data catalogue for all datasets in the data
    lake, data warehouse, and operational stores. Provides data discovery,
    lineage tracking, quality scoring, and ownership metadata. Enables
    data consumers to find and understand certified data products.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/data-catalogue-service
  tags:
    - data-analytics
    - data-lake
    - governance
    - python
    - rest
  links:
    - url: https://confluence.parasol.com/display/DATA/data-catalogue-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/data-catalogue-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/data-analytics-engineering
  system: data-lake-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: data-quality-monitoring-service
  title: Data Quality Monitoring Service
  description: |
    Continuously monitors data quality across the lake and warehouse using
    configurable rules for completeness, accuracy, consistency, and
    timeliness. Raises data quality incidents, routes them to owning teams,
    and tracks resolution to maintain trust in certified data products.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/data-quality-monitoring-service
  tags:
    - data-analytics
    - data-lake
    - governance
    - python
    - rest
