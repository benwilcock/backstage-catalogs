  owner: group:default/data-analytics-engineering
  system: data-lake-system
  dependsOn:
    - component:default/data-ingestion-platform-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: pii-masking-service
  title: PII Masking & Anonymisation Service
  description: |
    Detects and applies masking, pseudonymisation, or anonymisation to
    personally identifiable information in data lake datasets. Supports
    GDPR and CCPA compliance by ensuring analytics workloads operate on
    de-identified data unless explicit data subject consent is recorded.
  annotations:
