      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/data-analytics-engineering
  system: actuarial-platform-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: catastrophe-model-service
  title: Catastrophe Modelling Service
  description: |
    Runs catastrophe model scenarios (RMS, AIR Worldwide) against Parasol's
    in-force property portfolio to estimate probable maximum losses. Outputs
    feed into reinsurance buying strategy, capital modelling, and pricing
    adequacy assessment for catastrophe-exposed lines.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/catastrophe-model-service
  tags:
    - data-analytics
    - actuarial
