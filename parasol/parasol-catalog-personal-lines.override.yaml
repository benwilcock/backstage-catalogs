---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: vehicle-theft-risk-service
  title: Vehicle Theft Risk Service
  description: |
    Calculates theft risk scores for vehicles based on DVLA theft statistics,
    manufacturer security ratings, and Thatcham Research data. Scores are
    used as underwriting factors and to determine security device requirements
    as a condition of cover.
