      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/personal-lines-engineering
  system: flood-risk-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: catastrophe-exposure-monitor
  title: Catastrophe Exposure Monitor
  description: |
    Tracks Parasol's aggregate property exposure to catastrophe perils by
    cresta zone and peril type. Monitors accumulation against reinsurance
    programme limits and alerts the catastrophe management team when
    aggregate exposure approaches treaty capacity thresholds.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/catastrophe-exposure-monitor
  tags:
    - personal-property
    - catastrophe
    - risk
    - reinsurance
    - python
    - rest
  links:
    - url: https://confluence.parasol.com/display/PERSONAL/catastrophe-exposure-monitor
