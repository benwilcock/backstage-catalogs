# Parasol Insurance -- Personal Lines Domain Components
#
# Covers all microservices in:
#   personal-auto:     auto-policy-system, telematics-system, vehicle-data-system
#   personal-property: property-policy-system, property-valuation-system, flood-risk-system

# ===========================================================================
# AUTO POLICY SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: auto-policy-issuance-service
  title: Auto Policy Issuance Service
  description: |
    Issues personal motor insurance policies after quote acceptance and bind
    confirmation. Assigns policy numbers, writes coverage schedules including
    named drivers and vehicle details, and dispatches the policy to the
    document delivery service for customer dispatch.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/auto-policy-issuance-service
  tags:
    - personal-auto
    - motor
    - policy
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/PERSONAL/auto-policy-issuance-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/auto-policy-issuance-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/personal-lines-engineering
  system: auto-policy-system
  dependsOn:
    - component:default/policy-inception-service
    - component:default/vehicle-data-lookup-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: named-driver-management-service
  title: Named Driver Management Service
  description: |
    Manages the named driver schedule for personal auto policies. Handles
    driver additions, removals, and modifications including occupation, licence
    history, and claims record updates. Re-rates the policy on each change and
    triggers endorsement processing.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/named-driver-management-service
  tags:
    - personal-auto
    - motor
    - policy
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/PERSONAL/named-driver-management-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/named-driver-management-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/personal-lines-engineering
  system: auto-policy-system
  dependsOn:
    - component:default/endorsement-request-service
    - component:default/dvla-driver-check-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: dvla-driver-check-service
  title: DVLA Driver Check Service
  description: |
    Integrates with the DVLA My Licence API to retrieve driving licence
    endorsements and penalty points for named drivers on personal motor
    policies. Results feed into the underwriting eligibility check and
    no-claims discount validation at renewal.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/dvla-driver-check-service
  tags:
    - personal-auto
    - motor
    - integration
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/PERSONAL/dvla-driver-check-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/dvla-driver-check-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/personal-lines-engineering
  system: auto-policy-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: no-claims-discount-service
  title: No-Claims Discount Service
  description: |
    Maintains and validates the no-claims discount (NCD) entitlement for
    personal motor policyholders. Tracks NCD years, applies discounts in
    the rating engine, handles NCD protection add-ons, and manages NCD
    surrender following an at-fault claim.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/no-claims-discount-service
  tags:
    - personal-auto
    - motor
    - rating
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/PERSONAL/no-claims-discount-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/no-claims-discount-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/personal-lines-engineering
  system: auto-policy-system
  dependsOn:
    - component:default/premium-rating-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: motor-mta-legacy-adapter
  title: Motor MTA Legacy Adapter
  description: |
    SOAP-based legacy adapter bridging the modern auto policy system to the
    previous-generation Motor Transaction Application (MTA) mainframe. Enables
    the migration of historical motor policy records and supports policy lookup
    for pre-2018 policies not yet migrated to the new platform.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/motor-mta-legacy-adapter
  tags:
    - personal-auto
    - motor
    - legacy
    - soap
    - mainframe
  links:
