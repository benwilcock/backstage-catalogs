      title: Source Code
      icon: github
spec:
  type: legacy
  lifecycle: deprecated
  owner: group:default/personal-lines-engineering
  system: auto-policy-system

# ===========================================================================
# TELEMATICS SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: telematics-data-ingestion-service
  title: Telematics Data Ingestion Service
  description: |
    Ingests high-frequency telematics data streams from in-vehicle black
    boxes and the Parasol mobile app. Handles connection management, data
    deduplication, and buffering before forwarding to the trip scoring
    pipeline. Processes approximately 2 million events per hour at peak.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/telematics-data-ingestion-service
  tags:
    - personal-auto
    - telematics
    - ubi
    - streaming
    - java
    - kafka
  links:
    - url: https://confluence.parasol.com/display/PERSONAL/telematics-data-ingestion-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/telematics-data-ingestion-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/personal-lines-engineering
  system: telematics-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: trip-scoring-service
  title: Trip Scoring Service
  description: |
    Analyses individual driving trips from the telematics data stream to
    produce per-trip safety scores across dimensions including speed,
    acceleration, braking, cornering, and time-of-day risk. Scores are
    aggregated into a rolling driver score that feeds the UBI pricing model.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/trip-scoring-service
  tags:
    - personal-auto
    - telematics
    - ubi
    - machine-learning
    - python
  links:
    - url: https://confluence.parasol.com/display/PERSONAL/trip-scoring-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/trip-scoring-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/personal-lines-engineering
  system: telematics-system
  dependsOn:
    - component:default/telematics-data-ingestion-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ubi-premium-adjustment-service
  title: UBI Premium Adjustment Service
  description: |
    Calculates usage-based insurance (UBI) premium adjustments based on
    accumulated driver scores. Triggers mid-term pricing adjustments for
    pay-how-you-drive (PHYD) policies and generates driver feedback reports
    displayed in the customer mobile app.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/ubi-premium-adjustment-service
  tags:
    - personal-auto
    - telematics
    - ubi
    - rating
    - python
    - rest
  links:
    - url: https://confluence.parasol.com/display/PERSONAL/ubi-premium-adjustment-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/ubi-premium-adjustment-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/personal-lines-engineering
  system: telematics-system
  dependsOn:
    - component:default/trip-scoring-service
    - component:default/premium-rating-service

