---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: flood-risk-assessment-service
  title: Flood Risk Assessment Service
  description: |
    Assesses flood risk for property addresses using Environment Agency flood
    zone maps, historical flood event records, and terrain elevation data.
    Returns flood zone classification and estimated return period for use in
    underwriting eligibility checks and property premium rating.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/flood-risk-assessment-service
  tags:
