---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: classic-vehicle-registry-service
  title: Classic Vehicle Registry Service
  description: |
    Maintains the Parasol internal registry of agreed-value classic and
    collector vehicles. Stores vehicle descriptions, condition reports,
    appraisal documents, and agreed values negotiated at policy inception
