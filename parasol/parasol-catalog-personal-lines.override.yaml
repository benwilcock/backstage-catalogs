  lifecycle: production
  owner: group:default/personal-lines-engineering
  system: flood-risk-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: subsidence-risk-assessment-service
  title: Subsidence & Ground Movement Risk Service
  description: |
    Evaluates subsidence and ground movement risk based on geological survey
    data, soil shrink-swell classification, proximity to mining areas, and
    tree root distance analysis. High-risk properties are referred to senior
    underwriters before cover is offered.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/subsidence-risk-assessment-service
  tags:
    - personal-property
    - home
    - subsidence
