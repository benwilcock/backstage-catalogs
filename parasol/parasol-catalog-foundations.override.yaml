# Parasol Insurance Group -- Foundations Catalog
#
# Contains all Group, Domain, and System entities for the Parasol Insurance
# fictional internal software catalog. This file is the structural backbone;
# all Component and API entities live in separate domain-specific files.
#
# Parasol Insurance Group: multinational P&C, life, and health insurer.
# Headquarters: Chicago, IL. Operations: US, UK, EU, APAC.
# ~25,000 employees; ~$18bn annual premium revenue.
# All source code on internal GitHub Enterprise: https://github.parasol.com

# ===========================================================================
# GROUPS (Engineering Teams)
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: personal-lines-engineering
  title: Personal Lines Engineering
  description: |
    Owns personal auto (motor) and personal property (home, renters, contents)
    insurance systems. Responsible for policy issuance, rating, and claims
    integration for individual and family customers.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: commercial-lines-engineering
  title: Commercial Lines Engineering
  description: |
    Owns commercial liability, property, workers' compensation, and fleet
    insurance systems. Serves business customers from SMEs to large corporates.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: specialty-lines-engineering
  title: Specialty Lines Engineering
  description: |
    Owns cyber insurance, marine, aviation, and trade credit specialty
    insurance systems. Handles complex, non-standard risk products.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: life-annuities-engineering
  title: Life & Annuities Engineering
  description: |
    Owns life insurance products, annuities, and pension administration
    systems. Manages long-duration contracts and mortality risk models.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: claims-engineering
  title: Claims Engineering
  description: |
    Owns cross-line-of-business claims intake, triage, assessment, payment,
    and fraud detection systems. Handles the full claims lifecycle from FNOL
    through settlement and subrogation recovery.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: underwriting-engineering
  title: Underwriting Engineering
  description: |
    Owns risk assessment, pricing models, quote and bind workflows, and
    capacity management systems. Supports all lines of business with
    underwriting decisioning and rating engine services.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: digital-channels-engineering
  title: Digital Channels Engineering
  description: |
    Owns the customer-facing web portal, mobile apps, and broker portal.
    Responsible for digital customer experience, self-service, and
    third-party intermediary integrations.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: policy-platform-engineering
  title: Policy Platform Engineering
  description: |
    Owns the core policy administration platform shared across all lines of
    business. Manages policy lifecycle from inception through renewal,
    endorsement, lapse, and cancellation.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: billing-payments-engineering
  title: Billing & Payments Engineering
  description: |
    Owns premium collection, instalment scheduling, direct debit mandates,
    payment processing, refund management, and lapse/reinstatement workflows.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: reinsurance-engineering
  title: Reinsurance Engineering
  description: |
    Owns outward reinsurance treaty and facultative placement systems,
    bordereau reporting, and cession management. Interfaces with external
    reinsurers and Lloyd's market counterparties.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: data-analytics-engineering
  title: Data & Analytics Engineering
  description: |
    Owns the enterprise data lake, actuarial modelling platforms, ML/AI
    pipelines, and regulatory reporting infrastructure. Provides data
    products consumed by all business domains.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: parasol-platform-engineering
  title: Parasol Platform Engineering
  description: |
    Owns shared infrastructure including identity and access management,
    API gateway, service mesh, observability stack, and the internal
    developer platform. Serves all engineering teams as an internal platform.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: compliance-engineering
  title: Compliance Engineering
  description: |
    Owns regulatory reporting systems, audit trail infrastructure, GDPR
    data management tooling, and Solvency II compliance pipelines. Ensures
    Parasol meets all regulatory obligations across jurisdictions.
spec:
  type: team
  children: []

