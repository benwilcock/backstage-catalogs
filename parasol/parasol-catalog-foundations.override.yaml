# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: treaty-management-system
  title: Treaty Management System
  description: |
    Manages outward proportional and non-proportional reinsurance treaty
    placements. Tracks treaty structure, shares, limits, retentions, and
    inuring priorities across all lines of business.
spec:
  owner: group:default/reinsurance-engineering
  domain: reinsurance

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: facultative-placement-system
  title: Facultative Placement System
  description: |
    Manages individual facultative reinsurance submissions for risks that
    exceed treaty automatic binding limits. Handles slip preparation,
    reinsurer market approaches, and acceptance recording.
spec:
  owner: group:default/reinsurance-engineering
  domain: reinsurance

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: bordereau-reporting-system
  title: Bordereau Reporting System
  description: |
    Generates and distributes reinsurance bordereau reports to treaty
    reinsurers on a monthly and quarterly basis. Manages cession accounting,
    premium and loss statements, and reinsurer cash calls.
spec:
  owner: group:default/reinsurance-engineering
  domain: reinsurance

# ===========================================================================
# SYSTEMS -- Data & Analytics Domain
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: data-lake-system
  title: Enterprise Data Lake System
  description: |
    Central data lake ingesting raw data from all operational systems into
    a governed data platform. Provides certified data products and curated
    datasets for analytics, actuarial, and regulatory consumption.
spec:
  owner: group:default/data-analytics-engineering
  domain: data-analytics

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: actuarial-platform-system
  title: Actuarial Platform System
  description: |
    Actuarial modelling and reserving platform. Hosts chain-ladder and
    stochastic reserve models, pricing actuarial workflows, and Solvency II
    capital model inputs.
spec:
  owner: group:default/data-analytics-engineering
  domain: data-analytics

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: ml-pipeline-system
  title: ML Pipeline System
  description: |
    Machine learning model training, validation, and deployment platform.
    Serves fraud detection, churn prediction, lifetime value, and
    pricing optimisation models across all business domains.
spec:
  owner: group:default/data-analytics-engineering
  domain: data-analytics

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: reporting-system
  title: Business Intelligence & Reporting System
  description: |
    Enterprise BI platform delivering management dashboards, operational
    reports, and regulatory returns. Integrates with the data lake and
    provides self-service analytics for business users.
spec:
  owner: group:default/data-analytics-engineering
  domain: data-analytics

# ===========================================================================
# SYSTEMS -- Platform Engineering Domain
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: identity-access-system
  title: Identity & Access Management System
  description: |
    Enterprise IAM platform providing authentication, authorisation, and
    directory services for all internal systems, customer-facing applications,
    and machine-to-machine service identities.
spec:
  owner: group:default/parasol-platform-engineering
  domain: platform-engineering

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: api-gateway-system
  title: API Gateway System
  description: |
    Centralised API gateway and service mesh for all internal and external
    APIs. Provides rate limiting, mTLS, JWT validation, API key management,
    and traffic management across microservices.
spec:
  owner: group:default/parasol-platform-engineering
  domain: platform-engineering

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: observability-system
  title: Observability System
  description: |
    Enterprise observability platform aggregating metrics, logs, and
    distributed traces from all services. Provides alerting, SLO tracking,
    on-call management, and incident response tooling.
spec:
  owner: group:default/parasol-platform-engineering
  domain: platform-engineering

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: developer-platform-system
  title: Developer Platform System
  description: |
    Internal developer platform (IDP) providing self-service infrastructure
    provisioning, CI/CD pipeline templates, secret management, container
    registry, and developer portal (this catalog).
spec:
  owner: group:default/parasol-platform-engineering
  domain: platform-engineering

# ===========================================================================
# SYSTEMS -- Compliance & Regulatory Domain
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: regulatory-reporting-system
  title: Regulatory Reporting System
  description: |
    Produces and submits regulatory returns to NAIC (US), FCA (UK), and
    EIOPA (EU) on statutory schedules. Manages Solvency II QRT production,
    Lloyd's reporting, and state-specific insurance department filings.
spec:
  owner: group:default/compliance-engineering
  domain: compliance-regulatory

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: audit-trail-system
  title: Audit Trail System
  description: |
    Immutable audit log platform capturing all system events, data access,
    and user actions across Parasol's IT estate. Supports forensic
    investigation, regulatory audit, and SOX compliance evidence.
spec:
  owner: group:default/compliance-engineering
  domain: compliance-regulatory

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: gdpr-compliance-system
  title: GDPR & Privacy Compliance System
  description: |
    Manages GDPR and CCPA data subject rights requests: access, erasure,
    portability, and objection. Maintains records of processing activities,
    data retention schedules, and consent management across all systems.
spec:
  owner: group:default/compliance-engineering
  domain: compliance-regulatory
