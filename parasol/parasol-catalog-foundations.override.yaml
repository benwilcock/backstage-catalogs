kind: System
metadata:
  name: renewal-management-system
  title: Renewal Management System
  description: |
    Manages the annual renewal cycle for all policy types: re-rating,
    retention scoring, renewal offer generation, auto-renewal processing,
    and lapse management for non-renewing policies.
spec:
  owner: group:default/underwriting-engineering
  domain: underwriting

