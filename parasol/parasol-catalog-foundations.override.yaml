spec:
  owner: group:default/underwriting-engineering
  domain: underwriting

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: policy-endorsement-system
  title: Policy Endorsement System
  description: |
    Handles mid-term policy changes (endorsements) including coverage
