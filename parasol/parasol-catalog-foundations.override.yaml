# ===========================================================================
# SYSTEMS -- Claims Domain
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: fnol-system
  title: FNOL System
  description: |
    First Notice of Loss intake and triage system. Accepts loss notifications
    from all channels (web, mobile, phone, third-party adjusters), validates
    coverage, and routes claims to the appropriate assessment workflow.
spec:
  owner: group:default/claims-engineering
  domain: claims

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: claims-assessment-system
  title: Claims Assessment System
  description: |
    Manages adjuster assignment, damage estimation, reserve calculation, and
    claims decisioning workflows. Supports both field adjusters and desk-based
    virtual adjustment for lower-severity claims.
spec:
  owner: group:default/claims-engineering
  domain: claims

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: claims-payment-system
  title: Claims Payment System
  description: |
    Processes approved claim settlements and interim payments. Supports bank
    transfer, cheque, and digital wallet disbursements. Enforces dual-control
    approval for payments above threshold limits.
spec:
  owner: group:default/claims-engineering
  domain: claims

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: claims-fraud-detection-system
  title: Claims Fraud Detection System
  description: |
    Real-time and batch fraud scoring for submitted claims using ML models,
    network graph analysis, and third-party data enrichment. Flags suspicious
    claims for Special Investigations Unit (SIU) review.
spec:
  owner: group:default/claims-engineering
  domain: claims

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: claims-document-system
  title: Claims Document System
  description: |
    Manages all claim-related documents including loss photographs, repair
    estimates, medical reports, witness statements, and settlement letters.
    Provides document capture, classification, and retrieval services.
spec:
  owner: group:default/claims-engineering
  domain: claims

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: claims-litigation-system
  title: Claims Litigation System
  description: |
    Manages claims that escalate to legal proceedings, including solicitor
    appointment, court date tracking, subrogation recovery actions, and
    inter-company recovery workflows.
spec:
  owner: group:default/claims-engineering
  domain: claims

