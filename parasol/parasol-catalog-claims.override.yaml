kind: Component
metadata:
  name: panel-solicitor-gateway
  title: Panel Solicitor Gateway
  description: |
    SOAP-based integration gateway connecting Parasol's claims litigation
    system to external panel law firms. Transmits claim instructions, receives
    status updates and fee notes, and synchronises case milestones. Being
    phased out in favour of a REST API as panel firms modernise.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/panel-solicitor-gateway
  tags:
    - claims
    - litigation
    - legal
    - soap
    - legacy
  links:
    - url: https://confluence.parasol.com/display/CLAIMS/panel-solicitor-gateway
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/panel-solicitor-gateway
      title: Source Code
      icon: github
spec:
  type: legacy
  lifecycle: deprecated
  owner: group:default/claims-engineering
  system: claims-litigation-system
  dependsOn:
    - component:default/litigation-case-management-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: recovery-action-tracker
  title: Recovery Action Tracker
  description: |
    Tracks inter-company recovery actions, subrogation demands, and
    contribution claims against third-party insurers. Manages arbitration
    submissions to ICA (Insurance Company Arbitration) and records
    recoveries against the original claim reserve.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/recovery-action-tracker
  tags:
    - claims
    - litigation
    - recovery
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/CLAIMS/recovery-action-tracker
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/recovery-action-tracker
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/claims-engineering
  system: claims-litigation-system
  dependsOn:
    - component:default/subrogation-recovery-service
