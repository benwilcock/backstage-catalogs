---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: claims-reserve-calculator
  title: Claims Reserve Calculator
  description: |
    Sets and updates the case reserve for each open claim based on damage
    estimates, comparable settled claims, legal exposure factors, and
    reinsurance treaty structure. Triggers reinsurance notification when
    reserves breach facultative reporting thresholds.
