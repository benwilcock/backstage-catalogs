# Parasol Insurance -- Claims Domain Components
#
# Covers all microservices in the claims domain:
#   fnol-system, claims-assessment-system, claims-payment-system,
#   claims-fraud-detection-system, claims-document-system, claims-litigation-system

# ===========================================================================
# FNOL SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: fnol-intake-service
  title: FNOL Intake Service
  description: |
    Accepts first notice of loss submissions from all channels: web portal,
    mobile app, broker portal, phone (via IVR integration), and third-party
    loss adjusters. Validates mandatory FNOL fields, checks policy in-force
    status, and creates the initial claim record.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/fnol-intake-service
  tags:
    - claims
    - fnol
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/CLAIMS/fnol-intake-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/fnol-intake-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/claims-engineering
  system: fnol-system
  dependsOn:
    - component:default/policy-coverage-query-service
    - component:default/policy-search-index-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: fnol-triage-router
  title: FNOL Triage Router
  description: |
    Applies configurable triage rules to route newly created claims to the
    correct handling queue: automated low-value fast-track, virtual desk
    adjustment, or field adjuster dispatch. Rules are maintained by the
    claims operations team without code deployments.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/fnol-triage-router
  tags:
    - claims
    - fnol
    - java
    - rules-engine
  links:
    - url: https://confluence.parasol.com/display/CLAIMS/fnol-triage-router
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/fnol-triage-router
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/claims-engineering
  system: fnol-system
  dependsOn:
    - component:default/fnol-intake-service
    - component:default/fraud-score-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: fnol-channel-adapter-service
  title: FNOL Channel Adapter Service
  description: |
    Normalises inbound FNOL payloads from heterogeneous sources (REST, SOAP,
    flat-file, EDI) into the canonical Parasol Claims Data Model before
    forwarding to the intake service. Supports legacy third-party adjuster
    integrations that still use ACORD XML messaging.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/fnol-channel-adapter-service
  tags:
    - claims
    - fnol
    - java
    - integration
    - acord
  links:
    - url: https://confluence.parasol.com/display/CLAIMS/fnol-channel-adapter-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/fnol-channel-adapter-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/claims-engineering
  system: fnol-system
  dependsOn:
    - component:default/fnol-intake-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: coverage-verification-service
  title: Coverage Verification Service
  description: |
    Confirms that a reported loss event falls within the scope of the
    policyholder's active coverage at the time of loss. Checks deductibles,
    exclusions, geographic limits, and named-peril restrictions against
    the policy record.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/coverage-verification-service
  tags:
    - claims
    - fnol
    - python
    - rest
  links:
    - url: https://confluence.parasol.com/display/CLAIMS/coverage-verification-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/coverage-verification-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/claims-engineering
  system: fnol-system
  dependsOn:
    - component:default/policy-coverage-query-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: claimant-notification-service
  title: Claimant Notification Service
  description: |
    Sends acknowledgement notifications to claimants and policyholders at
    key claim milestones: FNOL receipt, adjuster assignment, inspection
    scheduling, and settlement offer. Supports email, SMS, push, and
    letter channels with jurisdiction-specific statutory notice wording.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/claimant-notification-service
  tags:
    - claims
    - notifications
