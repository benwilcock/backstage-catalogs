# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: fraud-score-service
  title: Fraud Score Service
  description: |
    Produces a real-time fraud risk score for each submitted claim using an
    ensemble of ML models trained on historical fraud outcomes. Features
    include claim characteristics, claimant history, network relationships,
    and third-party data signals. Scores are consumed by the FNOL triage
    router and adjuster assignment service.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/fraud-score-service
  tags:
    - claims
    - fraud
    - machine-learning
    - python
    - rest
    - experimental
  links:
    - url: https://confluence.parasol.com/display/CLAIMS/fraud-score-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/fraud-score-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/claims-engineering
  system: claims-fraud-detection-system
  dependsOn:
    - component:default/fraud-network-graph-service
    - component:default/third-party-data-enrichment-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: fraud-network-graph-service
  title: Fraud Network Graph Service
  description: |
    Maintains a real-time graph of relationships between claimants, vehicles,
    addresses, phone numbers, bank accounts, repair shops, and legal firms.
    Detects fraud rings by identifying anomalous connectivity patterns that
    signal organised fraud activity.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/fraud-network-graph-service
  tags:
