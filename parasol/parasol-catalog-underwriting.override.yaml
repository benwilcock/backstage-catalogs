# ===========================================================================
# RISK ASSESSMENT SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: automated-uw-decisioning-service
  title: Automated Underwriting Decisioning Service
  description: |
    Applies Parasol's underwriting guidelines and appetite rules to deliver
    an automated accept, decline, or referral decision for each risk. Rules
    are maintained in a business-readable decision table format, enabling
    underwriters to adjust appetite without engineering involvement.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/automated-uw-decisioning-service
  tags:
    - underwriting
    - risk
    - rules-engine
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/UW/automated-uw-decisioning-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/automated-uw-decisioning-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: risk-assessment-system
  dependsOn:
    - component:default/exposure-accumulation-service
    - component:default/sanctions-screening-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: exposure-accumulation-service
  title: Exposure Accumulation Service
  description: |
    Tracks Parasol's total insured exposure by geography, peril, and industry
    class in real time. Enforces aggregate limits and accumulation controls
    to ensure new risks do not breach reinsurance treaty capacity or Parasol's
    risk appetite for catastrophe exposure.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/exposure-accumulation-service
  tags:
    - underwriting
    - risk
    - actuarial
    - python
    - rest
