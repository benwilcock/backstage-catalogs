      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: rating-engine-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: tax-levy-calculator
  title: Tax & Levy Calculator
  description: |
    Calculates insurance premium tax (IPT), surplus lines tax, FSLSO levies,
    and other jurisdiction-specific taxes and fees applied to gross premium.
    Maintains up-to-date tax rates for all US states and international
    territories where Parasol writes business.
  annotations:
