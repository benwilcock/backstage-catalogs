# ===========================================================================
# RENEWAL MANAGEMENT SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: renewal-offer-generation-service
  title: Renewal Offer Generation Service
  description: |
    Generates renewal invitation packs for expiring policies. Re-rates each
    policy with the current rate table, applies retention pricing adjustments,
    and produces renewal offer documents dispatched 28 days before expiry
    in compliance with FCA and state notice requirements.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/renewal-offer-generation-service
  tags:
    - underwriting
    - renewal
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/UW/renewal-offer-generation-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/renewal-offer-generation-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: renewal-management-system
  dependsOn:
    - component:default/premium-rating-service
    - component:default/retention-score-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: retention-score-service
  title: Retention Score Service
  description: |
    Predicts the probability that a renewing policyholder will lapse using
    a gradient-boosted ML model trained on historical renewal outcomes.
    Scores feed into retention pricing adjustments in the renewal offer
    generation process and trigger targeted retention interventions.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/retention-score-service
  tags:
    - underwriting
    - renewal
    - machine-learning
    - python
    - experimental
  links:
    - url: https://confluence.parasol.com/display/UW/retention-score-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/retention-score-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: experimental
  owner: group:default/underwriting-engineering
  system: renewal-management-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: auto-renewal-processor
  title: Auto-Renewal Processor
  description: |
    Processes the automatic renewal of policies where the policyholder has
    consented to auto-renewal. Confirms coverage continuation, issues the
    renewed policy, triggers billing collection, and sends statutory renewal
    confirmation within regulatory timeframes.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/auto-renewal-processor
  tags:
    - underwriting
    - renewal
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/UW/auto-renewal-processor
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/auto-renewal-processor
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: renewal-management-system
  dependsOn:
    - component:default/renewal-offer-generation-service
    - component:default/policy-inception-service
