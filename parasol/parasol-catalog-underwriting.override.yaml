    - url: https://github.parasol.com/parasol/sanctions-screening-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: risk-assessment-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: referral-management-service
  title: Referral Management Service
  description: |
    Manages underwriting referrals that cannot be auto-decided. Routes
    risks to the appropriate senior underwriter or specialist team, tracks
    referral resolution SLAs, and records referral decisions as a feedback
    signal for rule and model improvement.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/referral-management-service
  tags:
    - underwriting
    - risk
    - workflow
    - java
    - rest
  links:
