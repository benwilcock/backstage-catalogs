---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: endorsement-request-service
  title: Endorsement Request Service
  description: |
    Accepts mid-term change requests from policyholders and brokers via
    all channels. Validates the requested change against product rules,
    triggers re-rating, and creates a pending endorsement transaction
    requiring underwriter approval for referred changes.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/endorsement-request-service
  tags:
