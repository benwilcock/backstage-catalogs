# Parasol Insurance -- Underwriting Domain Components
#
# Covers all microservices in the underwriting domain:
#   quote-bind-system, rating-engine-system, risk-assessment-system,
#   policy-endorsement-system, renewal-management-system

# ===========================================================================
# QUOTE & BIND SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: quote-orchestration-service
  title: Quote Orchestration Service
  description: |
    Orchestrates the end-to-end quote journey across all personal and
    commercial lines products. Coordinates calls to rating, eligibility,
    and document generation services, and manages quote versioning and
    expiry. Acts as the primary entry point for all quote-to-bind flows.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/quote-orchestration-service
  tags:
    - underwriting
    - quoting
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/UW/quote-orchestration-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/quote-orchestration-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: quote-bind-system
  dependsOn:
    - component:default/premium-rating-service
    - component:default/eligibility-rules-service
    - component:default/quote-document-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: bind-confirmation-service
  title: Bind Confirmation Service
  description: |
    Converts an accepted quote into a bound policy. Validates that the quote
    has not expired, checks underwriting authority limits, triggers policy
    inception in the policy lifecycle system, and returns the bound policy
    reference to the originating channel.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/bind-confirmation-service
  tags:
    - underwriting
    - quoting
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/UW/bind-confirmation-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/bind-confirmation-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: quote-bind-system
  dependsOn:
    - component:default/quote-orchestration-service
    - component:default/policy-inception-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: eligibility-rules-service
  title: Eligibility Rules Service
  description: |
    Applies product eligibility rules and underwriting appetite controls to
    determine whether a risk can be quoted and bound under Parasol's standard
    terms. Rules include age restrictions, claims history thresholds, credit
    score requirements, and geographic trading limits.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/eligibility-rules-service
  tags:
    - underwriting
    - quoting
    - rules-engine
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/UW/eligibility-rules-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/eligibility-rules-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: quote-bind-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: quote-document-service
  title: Quote Document Service
  description: |
    Generates quote summary documents, insurance product information
    documents (IPIDs), and key facts sheets for all personal and commercial
    lines products. Renders to PDF and provides storage in the document
    management platform with a time-limited retrieval URL.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/quote-document-service
  tags:
    - underwriting
    - quoting
    - documents
    - python
    - rest
  links:
    - url: https://confluence.parasol.com/display/UW/quote-document-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/quote-document-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: quote-bind-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: aggregator-gateway-service
  title: Aggregator Gateway Service
  description: |
    Provides a standardised API interface for price comparison websites
    (PCWs) and insurance aggregators to request quotes from Parasol. Handles
    rate limiting, credential management, quote mapping to/from aggregator
    schemas, and conversion tracking.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/aggregator-gateway-service
  tags:
    - underwriting
    - quoting
    - integration
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/UW/aggregator-gateway-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/aggregator-gateway-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: quote-bind-system
  dependsOn:
    - component:default/quote-orchestration-service

# ===========================================================================
# RATING ENGINE SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: premium-rating-service
  title: Premium Rating Service
  description: |
    Core actuarial rating service that calculates gross written premium for
    all Parasol products. Applies filed rate tables, factor relativities,
    minimum premiums, and taxes/levies. Supports real-time API calls
    and bulk re-rating for renewal and book management.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/premium-rating-service
  tags:
    - underwriting
    - rating
    - actuarial
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/UW/premium-rating-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/premium-rating-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: rating-engine-system
  dependsOn:
    - component:default/rate-table-management-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: rate-table-management-service
  title: Rate Table Management Service
  description: |
    Manages the lifecycle of actuarial rate tables and rating factors used
    by the premium rating service. Supports rate change filing workflows,
    effective date scheduling, version rollback, and A/B test rate cohorts
    for actuarial rate validation exercises.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/rate-table-management-service
  tags:
