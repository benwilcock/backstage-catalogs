      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/exposure-accumulation-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: risk-assessment-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: sanctions-screening-service
  title: Sanctions Screening Service
  description: |
    Screens policyholders, claimants, and counterparties against OFAC,
    HM Treasury, UN, and EU consolidated sanctions lists. Mandatory check
    at quote, bind, and claims payment stages. Flags matches for compliance
    officer review before policy or payment can proceed.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/sanctions-screening-service
  tags:
    - underwriting
    - risk
    - compliance
    - security
    - java
    - rest
