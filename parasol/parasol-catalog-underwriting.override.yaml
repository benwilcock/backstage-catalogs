  lifecycle: production
  owner: group:default/underwriting-engineering
  system: rating-engine-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: credit-score-integration-service
  title: Credit Score Integration Service
  description: |
    Integrates with Experian and Equifax credit bureaux to retrieve insurance
    credit scores used as rating factors for personal lines products. Manages
    consent, adverse action notices, and score refresh schedules for
    renewing policies.
