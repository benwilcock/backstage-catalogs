# COMMERCIAL POLICY SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: commercial-policy-issuance-service
  title: Commercial Policy Issuance Service
  description: |
    Issues commercial property, liability, and package policies for SME and
    mid-market business customers. Supports multi-location schedules, blanket
    property coverage structures, and industry-specific endorsements.
    Generates ACORD-compliant policy documents.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/commercial-policy-issuance-service
  tags:
    - commercial-lines
    - policy
    - java
    - rest
  links:
