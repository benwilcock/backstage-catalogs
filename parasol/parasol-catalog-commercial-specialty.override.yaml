      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/commercial-lines-engineering
  system: commercial-policy-system
  dependsOn:
    - component:default/policy-inception-service
    - component:default/certificate-of-insurance-service

---
apiVersion: backstage.io/v1alpha1
