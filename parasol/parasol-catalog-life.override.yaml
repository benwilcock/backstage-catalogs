# ===========================================================================
# MORTALITY & MORBIDITY RISK SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: life-underwriting-engine-service
  title: Life Underwriting Engine Service
  description: |
    Applies Parasol's life underwriting guidelines to new applications.
    Evaluates medical history, occupational hazards, foreign travel, and
    lifestyle factors to produce a standard, rated, or declined decision.
    Integrates with medical evidence providers for non-medical and full
    medical underwriting workflows.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/life-underwriting-engine-service
  tags:
    - life-annuities
    - underwriting
    - mortality
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/LIFE/life-underwriting-engine-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/life-underwriting-engine-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/life-annuities-engineering
  system: mortality-risk-system
  dependsOn:
    - component:default/mortality-table-service
    - component:default/reinsurance-binding-authority-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: mortality-table-service
  title: Mortality Table Service
  description: |
    Provides access to the actuarial mortality and morbidity tables used
    across the life and annuities business. Manages CMI mortality improvement
    projections, standard table versions, and Parasol's own experience-based
    table overlays derived from the life in-force portfolio.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/mortality-table-service
  tags:
    - life-annuities
    - actuarial
    - mortality
    - python
    - rest
  links:
    - url: https://confluence.parasol.com/display/LIFE/mortality-table-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/mortality-table-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/life-annuities-engineering
  system: mortality-risk-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: reinsurance-binding-authority-service
  title: Reinsurance Binding Authority Service
  description: |
    Manages the automatic binding authority limits agreed with life
    reinsurers. Checks each new life application against treaty automatic
    binding limits by age, sum assured, and benefit type. Flags cases
    that require facultative reinsurance submission before cover is issued.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/reinsurance-binding-authority-service
  tags:
    - life-annuities
    - reinsurance
    - underwriting
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/LIFE/reinsurance-binding-authority-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/reinsurance-binding-authority-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/life-annuities-engineering
  system: mortality-risk-system
  dependsOn:
    - component:default/mortality-table-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: predictive-mortality-model-service
  title: Predictive Mortality Model Service
  description: |
    Experimental ML service that augments traditional underwriting with
