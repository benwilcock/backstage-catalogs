apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: data-catalogue-api
  title: Data Catalogue API
  description: |
    Provides discovery and metadata access to the Parasol enterprise
    data catalogue. Enables data consumers to search for datasets, view
    lineage, check data quality scores, and request access to certified
    data products.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/data-catalogue-service
  tags:
    - data-analytics
    - governance
    - internal-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/data-analytics-engineering
  system: data-lake-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Data Catalogue API
      version: "2.0.0"
      description: Enterprise data catalogue for dataset discovery and governance.
    servers:
      - url: https://api-internal.parasol.com/data/catalogue/v2
    paths:
      /datasets:
        get:
          summary: Search datasets in the catalogue
          operationId: searchDatasets
          parameters:
            - name: q
              in: query
              description: Full-text search query
              schema:
                type: string
            - name: domain
              in: query
              schema:
                type: string
