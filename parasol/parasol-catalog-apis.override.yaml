# UNDERWRITING APIS
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: quote-bind-api
  title: Quote & Bind API
  description: |
    Enables broker management systems and insurance aggregators to request
    quotations from Parasol and bind accepted quotes into policies. Supports
    personal auto, personal property, and SME commercial lines products.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/quote-orchestration-service
  tags:
    - underwriting
    - quoting
    - public-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: quote-bind-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Quote & Bind API
      version: "4.2.0"
      description: Request quotations and bind policies for personal and commercial lines.
    servers:
      - url: https://api.parasol.com/underwriting/quote/v4
    paths:
      /quotes:
        post:
          summary: Request a new quotation
          operationId: createQuote
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/QuoteRequest"
          responses:
            "201":
              description: Quotation created successfully
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/QuoteResponse"
            "422":
              description: Risk declined or ineligible
      /quotes/{quoteId}:
        get:
          summary: Retrieve a quotation
          operationId: getQuote
          parameters:
            - name: quoteId
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Quote details
      /quotes/{quoteId}/bind:
        post:
          summary: Bind an accepted quotation into a policy
          operationId: bindQuote
          parameters:
            - name: quoteId
              in: path
              required: true
              schema:
                type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/BindRequest"
          responses:
            "201":
              description: Policy bound successfully
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/BindResponse"
            "409":
              description: Quote expired or already bound
    components:
      schemas:
        QuoteRequest:
          type: object
          required: [productCode, riskData]
          properties:
            productCode:
              type: string
            riskData:
              type: object
            effectiveDate:
              type: string
              format: date
        QuoteResponse:
          type: object
          properties:
            quoteId:
              type: string
            annualPremium:
              type: number
            expiryDateTime:
              type: string
              format: date-time
            terms:
              type: array
              items:
                type: string
        BindRequest:
          type: object
          required: [paymentMethod]
          properties:
            paymentMethod:
              type: string
              enum: [ANNUAL, MONTHLY_DD, QUARTERLY_CARD]
        BindResponse:
          type: object
          properties:
            policyNumber:
              type: string
            inceptionDate:
              type: string
              format: date

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: premium-rating-api
  title: Premium Rating API
  description: |
    Internal rating API consumed by all quoting services and the renewal
    engine. Calculates gross written premium for all Parasol products
    using the current filed rate tables and actuarial factors.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/premium-rating-service
  tags:
    - underwriting
    - rating
    - internal-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: rating-engine-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Premium Rating API
      version: "5.0.0"
      description: Calculates gross written premium for all Parasol products.
    servers:
      - url: https://api-internal.parasol.com/rating/v5
    paths:
      /rates/calculate:
        post:
          summary: Calculate premium for a given risk
          operationId: calculatePremium
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/RatingRequest"
          responses:
            "200":
              description: Premium calculation result
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/RatingResult"
      /rates/tables/{productCode}:
        get:
          summary: Retrieve current rate tables for a product
          operationId: getRateTables
          parameters:
            - name: productCode
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Rate table details
    components:
      schemas:
        RatingRequest:
          type: object
          required: [productCode, riskAttributes, effectiveDate]
          properties:
            productCode:
              type: string
            riskAttributes:
              type: object
            effectiveDate:
              type: string
              format: date
        RatingResult:
          type: object
          properties:
            grossPremium:
              type: number
            netPremium:
              type: number
            taxAmount:
              type: number
            ratingFactors:
              type: array
              items:
                type: object

