---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: reinsurance-bordereau-api
  title: Reinsurance Bordereau API
  description: |
    Internal API used by the bordereau reporting system to extract cession
    data and submit premium and loss bordereaux to treaty reinsurers.
    Provides endpoints for cession queries, report generation, and
    submission status tracking.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/premium-bordereau-service
  tags:
    - reinsurance
    - bordereau
    - internal-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/reinsurance-engineering
  system: bordereau-reporting-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Reinsurance Bordereau API
      version: "1.3.0"
      description: Generates and tracks reinsurance bordereau submissions.
    servers:
      - url: https://api-internal.parasol.com/reinsurance/bordereau/v1
    paths:
      /bordereaux:
        post:
          summary: Trigger generation of a bordereau report
          operationId: generateBordereau
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/BordereauRequest"
          responses:
            "202":
              description: Bordereau generation queued
        get:
          summary: List recent bordereau submissions
          operationId: listBordereaux
          parameters:
            - name: treatyId
              in: query
              schema:
                type: string
            - name: periodFrom
              in: query
              schema:
                type: string
                format: date
          responses:
            "200":
              description: List of bordereau submissions
      /bordereaux/{bordereauxId}/status:
        get:
          summary: Get submission status for a bordereau
          operationId: getBordereauxStatus
          parameters:
            - name: bordereauxId
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Bordereau submission status
    components:
      schemas:
        BordereauRequest:
          type: object
          required: [treatyId, reportingPeriod, bordereauxType]
          properties:
            treatyId:
              type: string
            reportingPeriod:
              type: string
              description: "YYYY-MM format"
            bordereauxType:
              type: string
              enum: [PREMIUM, LOSS, COMBINED]

