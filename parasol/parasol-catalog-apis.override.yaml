---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: policy-query-api
  title: Policy Query API
  description: |
    High-performance read API for policy coverage and schedule data.
    Consumed by the claims system for coverage verification, the customer
    portal for self-service display, the broker portal, and third-party
    loss adjusters. The most widely consumed API in Parasol's estate.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/policy-lookup-api-gateway
  tags:
    - policy
    - public-api
    - high-traffic
spec:
  type: openapi
  lifecycle: production
  owner: group:default/policy-platform-engineering
  system: policy-lifecycle-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Policy Query API
      version: "3.1.0"
      description: Read access to policy coverage and schedule data across all lines.
    servers:
      - url: https://api.parasol.com/policy/v3
    paths:
      /policies/{policyNumber}:
        get:
          summary: Retrieve policy details by policy number
          operationId: getPolicyByNumber
          parameters:
            - name: policyNumber
              in: path
              required: true
              schema:
                type: string
            - name: asOf
              in: query
              description: Return policy state as at this date (ISO 8601)
              schema:
                type: string
                format: date
          responses:
            "200":
              description: Policy details
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/PolicySummary"
            "403":
              description: Insufficient permission to view this policy
            "404":
              description: Policy not found
      /policies/search:
        get:
          summary: Search policies by insured identifiers
          operationId: searchPolicies
          parameters:
            - name: surname
              in: query
              schema:
                type: string
            - name: postcode
              in: query
              schema:
                type: string
            - name: vehicleRegistration
              in: query
              schema:
                type: string
          responses:
            "200":
              description: Matching policies
      /policies/{policyNumber}/coverage:
        get:
          summary: Retrieve detailed coverage schedule for a policy
          operationId: getPolicyCoverage
          parameters:
            - name: policyNumber
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Coverage schedule details
    components:
      schemas:
        PolicySummary:
          type: object
          properties:
            policyNumber:
              type: string
            status:
              type: string
              enum: [ACTIVE, LAPSED, CANCELLED, EXPIRED, PENDING]
            product:
              type: string
            inceptionDate:
              type: string
              format: date
            expiryDate:
              type: string
              format: date
            insuredName:
              type: string
            annualPremium:
              type: number

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: policy-endorsement-api
  title: Policy Endorsement API
  description: |
    Enables submission of mid-term policy change requests from all channels.
    Supports address changes, vehicle swaps, named driver amendments,
    coverage limit changes, and voluntary extras additions.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/endorsement-request-service
  tags:
    - policy
    - endorsement
    - public-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/underwriting-engineering
  system: policy-endorsement-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Policy Endorsement API
      version: "2.0.0"
      description: Submits and tracks mid-term policy change requests.
    servers:
      - url: https://api.parasol.com/policy/endorsements/v2
    paths:
      /endorsements:
        post:
          summary: Submit a new endorsement request
          operationId: createEndorsement
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/EndorsementRequest"
          responses:
            "202":
              description: Endorsement request accepted
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/EndorsementAcknowledgement"
      /endorsements/{endorsementId}:
        get:
          summary: Retrieve endorsement status
          operationId: getEndorsement
          parameters:
            - name: endorsementId
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Endorsement details and status
      /endorsements/{endorsementId}/quote:
        get:
          summary: Get premium adjustment quote for an endorsement
          operationId: getEndorsementQuote
          parameters:
            - name: endorsementId
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Pro-rata premium adjustment amount
    components:
      schemas:
        EndorsementRequest:
          type: object
          required: [policyNumber, changeType, effectiveDate]
          properties:
            policyNumber:
              type: string
            changeType:
              type: string
            effectiveDate:
              type: string
              format: date
            changeDetails:
              type: object
        EndorsementAcknowledgement:
          type: object
          properties:
            endorsementId:
              type: string
            status:
              type: string
            premiumAdjustment:
              type: number

