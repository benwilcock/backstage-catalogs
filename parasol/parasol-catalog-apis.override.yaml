# Parasol Insurance -- API Entities
#
# Contains API entities (type: openapi) for the most important cross-domain
# APIs in Parasol's internal service landscape. All definitions are inline
# as there are no external URLs to reference for this fictional catalog.

# ===========================================================================
# CLAIMS APIS
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: fnol-submission-api
  title: FNOL Submission API
  description: |
    Accepts first notice of loss submissions from all channels including the
    customer web portal, mobile app, broker portal, and third-party loss
    adjusters. Returns a claim reference number upon successful submission.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/fnol-intake-service
  tags:
    - claims
    - fnol
    - public-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/claims-engineering
  system: fnol-system
  definition: |
    openapi: "3.0.3"
    info:
      title: FNOL Submission API
      version: "2.1.0"
      description: Accepts first notice of loss submissions from all channels.
      contact:
        name: Claims Engineering
        email: claims-engineering@parasol.com
    servers:
      - url: https://api.parasol.com/claims/fnol/v2
    paths:
      /submissions:
        post:
          summary: Submit a new FNOL
          operationId: submitFnol
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/FnolSubmission"
          responses:
            "202":
              description: FNOL accepted and queued for processing
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/FnolAcknowledgement"
            "400":
              description: Invalid submission data
            "403":
              description: Coverage not verified for this policy
      /submissions/{submissionId}:
        get:
          summary: Retrieve an FNOL submission status
          operationId: getFnolStatus
          parameters:
            - name: submissionId
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: FNOL submission details
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/FnolSubmission"
            "404":
              description: Submission not found
    components:
      schemas:
        FnolSubmission:
          type: object
          required: [policyNumber, dateOfLoss, lossType, description]
          properties:
            policyNumber:
              type: string
            dateOfLoss:
              type: string
              format: date
            lossType:
              type: string
              enum: [MOTOR, PROPERTY, LIABILITY, LIFE, OTHER]
            description:
              type: string
            lossLocation:
              type: object
              properties:
                postcode:
                  type: string
                country:
                  type: string
        FnolAcknowledgement:
          type: object
          properties:
            submissionId:
              type: string
            claimReference:
              type: string
            status:
              type: string
            estimatedContactTime:
              type: string
              format: date-time

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: claims-status-api
  title: Claims Status API
  description: |
    Provides real-time claim status information to customers, brokers,
    and third-party systems. Returns claim milestones, current handler,
    reserve amounts (internal only), and payment history.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/claims-settlement-service
  tags:
    - claims
    - status
    - public-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/claims-engineering
  system: claims-assessment-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Claims Status API
      version: "1.4.0"
      description: Real-time claim status and milestone tracking.
    servers:
      - url: https://api.parasol.com/claims/status/v1
    paths:
      /claims/{claimReference}:
        get:
          summary: Get claim details and current status
          operationId: getClaimStatus
          parameters:
            - name: claimReference
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Claim status details
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ClaimStatus"
            "403":
              description: Not authorised to view this claim
            "404":
              description: Claim not found
      /claims/{claimReference}/milestones:
        get:
          summary: List all milestones for a claim
          operationId: getClaimMilestones
          parameters:
            - name: claimReference
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: List of claim milestones
      /claims/{claimReference}/payments:
        get:
          summary: List payments made against a claim
          operationId: getClaimPayments
          parameters:
            - name: claimReference
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Claim payment history
    components:
      schemas:
        ClaimStatus:
          type: object
          properties:
            claimReference:
              type: string
            status:
              type: string
              enum: [OPEN, PENDING_INFORMATION, UNDER_ASSESSMENT, SETTLED, CLOSED, DENIED]
            dateOpened:
              type: string
              format: date
            handlerName:
              type: string
            handlerPhone:
              type: string

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: fraud-score-api
  title: Fraud Score API
  description: |
    Returns real-time fraud risk scores for claims and payment transactions.
    Consumed by FNOL triage, adjuster assignment, and payment processing
    services. Also available to authorised SIU investigators.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/fraud-score-service
  tags:
    - claims
    - fraud
    - internal-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/claims-engineering
  system: claims-fraud-detection-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Fraud Score API
      version: "3.0.0"
      description: Real-time fraud risk scoring for claims and payments.
    servers:
      - url: https://api-internal.parasol.com/fraud/v3
    paths:
      /scores/claim:
        post:
          summary: Score a claim submission for fraud risk
          operationId: scoreClaimFraud
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/ClaimFraudRequest"
          responses:
            "200":
              description: Fraud score result
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/FraudScoreResult"
      /scores/payment:
        post:
          summary: Score a payment transaction for fraud risk
          operationId: scorePaymentFraud
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
          responses:
            "200":
              description: Payment fraud score result
    components:
      schemas:
        ClaimFraudRequest:
          type: object
          required: [claimReference, policyNumber]
          properties:
            claimReference:
              type: string
            policyNumber:
              type: string
            claimantId:
              type: string
        FraudScoreResult:
          type: object
          properties:
            score:
              type: number
              minimum: 0
              maximum: 100
            riskBand:
              type: string
              enum: [LOW, MEDIUM, HIGH, CRITICAL]
            referToSiu:
              type: boolean
            scoreFactors:
              type: array
              items:
                type: string

