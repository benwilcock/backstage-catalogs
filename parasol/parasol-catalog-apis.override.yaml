---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: iam-token-api
  title: IAM Token API
  description: |
    Issues OAuth 2.0 access tokens and OIDC ID tokens for all internal
    services and customer-facing applications. Provides JWKS endpoint
    for token validation, token introspection, and token revocation.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/iam-token-service
  tags:
    - platform-engineering
    - identity
    - oauth
    - internal-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/parasol-platform-engineering
  system: identity-access-system
  definition: |
    openapi: "3.0.3"
    info:
      title: IAM Token API
      version: "2.0.0"
      description: OAuth 2.0 and OIDC token issuance and management.
    servers:
      - url: https://auth.parasol.com/oauth2/v2
    paths:
      /token:
        post:
          summary: Request an access token
          operationId: requestToken
          requestBody:
            required: true
            content:
              application/x-www-form-urlencoded:
                schema:
                  type: object
                  required: [grant_type]
                  properties:
                    grant_type:
                      type: string
                    code:
                      type: string
                    client_id:
                      type: string
                    client_secret:
                      type: string
          responses:
            "200":
              description: Token issued
            "401":
              description: Authentication failed
      /introspect:
        post:
          summary: Introspect an access token
          operationId: introspectToken
          requestBody:
            required: true
            content:
              application/x-www-form-urlencoded:
                schema:
                  type: object
                  required: [token]
                  properties:
                    token:
                      type: string
          responses:
            "200":
              description: Token introspection result
      /jwks:
        get:
          summary: Retrieve the JSON Web Key Set
          operationId: getJwks
          responses:
            "200":
              description: JWKS for token signature verification
      /revoke:
        post:
          summary: Revoke an access or refresh token
          operationId: revokeToken
          requestBody:
            required: true
            content:
              application/x-www-form-urlencoded:
                schema:
                  type: object
                  required: [token]
                  properties:
                    token:
                      type: string
          responses:
            "200":
              description: Token revoked successfully

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: audit-log-api
  title: Audit Log API
  description: |
    Internal API for submitting and querying the immutable enterprise
    audit log. All Parasol systems must submit security and data access
    events here for regulatory compliance and forensic investigation.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/immutable-audit-log-service
  tags:
    - compliance-regulatory
    - audit
    - security
    - internal-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/compliance-engineering
  system: audit-trail-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Audit Log API
      version: "1.0.0"
      description: Append-only audit event submission and query interface.
    servers:
      - url: https://api-internal.parasol.com/compliance/audit/v1
    paths:
      /events:
        post:
          summary: Submit one or more audit events
          operationId: submitAuditEvents
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/AuditEventBatch"
          responses:
            "204":
              description: Events accepted
            "400":
              description: Invalid event format
        get:
          summary: Query audit events
          operationId: queryAuditEvents
          parameters:
            - name: subjectId
              in: query
              schema:
                type: string
            - name: eventType
              in: query
              schema:
                type: string
            - name: from
              in: query
              schema:
                type: string
                format: date-time
            - name: to
              in: query
              schema:
                type: string
                format: date-time
          responses:
            "200":
              description: Matching audit events
    components:
      schemas:
        AuditEventBatch:
          type: object
          required: [events]
          properties:
            events:
              type: array
              items:
                type: object
                required: [timestamp, eventType, actorId, subjectId]
                properties:
                  timestamp:
                    type: string
                    format: date-time
                  eventType:
                    type: string
                  actorId:
                    type: string
                  subjectId:
                    type: string
                  resourceType:
                    type: string
                  outcome:
                    type: string
                    enum: [SUCCESS, FAILURE, DENIED]

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: data-subject-rights-api
  title: Data Subject Rights API
  description: |
    Accepts and tracks GDPR and CCPA data subject rights requests. Provides
    endpoints for access, erasure, portability, and objection requests,
    with status tracking and deadline management built in.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/data-subject-rights-service
  tags:
    - compliance-regulatory
    - gdpr
    - privacy
    - public-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/compliance-engineering
  system: gdpr-compliance-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Data Subject Rights API
      version: "1.0.0"
      description: GDPR and CCPA data subject rights request management.
    servers:
      - url: https://api.parasol.com/privacy/dsr/v1
    paths:
      /requests:
        post:
          summary: Submit a data subject rights request
          operationId: submitDsrRequest
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/DsrRequest"
          responses:
            "202":
              description: Request accepted
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/DsrAcknowledgement"
      /requests/{requestId}:
        get:
          summary: Check status of a data subject rights request
          operationId: getDsrStatus
          parameters:
            - name: requestId
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Request status and response details
    components:
      schemas:
        DsrRequest:
          type: object
          required: [requestType, subjectEmail, subjectName]
          properties:
            requestType:
              type: string
              enum: [ACCESS, ERASURE, PORTABILITY, OBJECTION, RECTIFICATION]
            subjectEmail:
              type: string
              format: email
            subjectName:
              type: string
            verificationToken:
              type: string
        DsrAcknowledgement:
          type: object
          properties:
            requestId:
              type: string
            deadline:
              type: string
              format: date
            status:
              type: string
