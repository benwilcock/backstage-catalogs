        get:
          summary: Get data quality scores for a dataset
          operationId: getDataQuality
          parameters:
            - name: datasetId
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Data quality metrics

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: ml-model-inference-api
  title: ML Model Inference API
  description: |
    Provides a unified inference API for all production ML models hosted
    on the Parasol model serving platform. Consumers specify the model
    name and version; the platform handles routing, feature fetching,
    and prediction serving.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/model-serving-platform-service
  tags:
    - data-analytics
    - machine-learning
    - internal-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/data-analytics-engineering
  system: ml-pipeline-system
  definition: |
    openapi: "3.0.3"
    info:
      title: ML Model Inference API
      version: "1.1.0"
      description: Unified inference endpoint for all production ML models.
    servers:
      - url: https://api-internal.parasol.com/ml/inference/v1
    paths:
      /predict/{modelName}:
        post:
          summary: Request a prediction from a named model
          operationId: predict
          parameters:
            - name: modelName
              in: path
              required: true
              schema:
                type: string
            - name: version
              in: query
              description: Model version (defaults to production champion)
              schema:
                type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/InferenceRequest"
          responses:
            "200":
              description: Model prediction result
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/InferenceResponse"
      /models:
        get:
          summary: List available production models
          operationId: listModels
          responses:
            "200":
              description: List of deployed models
    components:
      schemas:
        InferenceRequest:
          type: object
          required: [features]
          properties:
            features:
              type: object
            requestId:
              type: string
        InferenceResponse:
          type: object
          properties:
            prediction:
              type: object
            modelVersion:
              type: string
            latencyMs:
              type: integer

