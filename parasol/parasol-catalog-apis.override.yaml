---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: broker-authentication-api
  title: Broker Authentication API
  description: |
    Authenticates brokers and intermediaries for access to the Parasol
    broker portal and Quote & Bind API. Validates FCA registration,
    manages firm-level and individual credentials, and returns scoped
    OAuth tokens with delegated authority permissions.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/broker-authentication-service
  tags:
    - customer-portal
    - broker
    - identity
    - public-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/digital-channels-engineering
  system: broker-portal-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Broker Authentication API
      version: "1.2.0"
      description: OAuth 2.0 authentication for brokers and intermediaries.
    servers:
      - url: https://api.parasol.com/auth/broker/v1
    paths:
      /token:
        post:
          summary: Obtain an OAuth access token (client credentials)
          operationId: getBrokerToken
          requestBody:
            required: true
            content:
              application/x-www-form-urlencoded:
                schema:
                  type: object
                  required: [grant_type, client_id, client_secret]
                  properties:
                    grant_type:
                      type: string
                      enum: [client_credentials]
                    client_id:
                      type: string
                    client_secret:
                      type: string
                    scope:
                      type: string
          responses:
            "200":
              description: Access token issued
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/TokenResponse"
            "401":
              description: Invalid client credentials
      /brokers/{firmId}/agents:
        get:
          summary: List agents registered under a broker firm
          operationId: listBrokerAgents
          parameters:
            - name: firmId
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: List of agents
      /brokers/{firmId}/binding-authority:
        get:
          summary: Retrieve binding authority limits for a broker firm
          operationId: getBindingAuthority
          parameters:
            - name: firmId
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Binding authority details
    components:
      schemas:
        TokenResponse:
          type: object
          properties:
            access_token:
              type: string
            token_type:
              type: string
            expires_in:
              type: integer
            scope:
              type: string

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: customer-self-service-api-spec
  title: Customer Self-Service API
  description: |
    Provides authenticated customers with self-service policy management
    capabilities via the web portal and mobile app. Exposes policy data,
    document download, change requests, and claims status.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/customer-self-service-api
  tags:
    - customer-portal
    - web
    - mobile
    - public-api
spec:
  type: openapi
  lifecycle: production
  owner: group:default/digital-channels-engineering
  system: web-portal-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Customer Self-Service API
      version: "3.0.0"
      description: Self-service policy management for authenticated customers.
    servers:
      - url: https://api.parasol.com/customer/self-service/v3
    paths:
      /my/policies:
        get:
          summary: List all policies for the authenticated customer
          operationId: listMyPolicies
          responses:
            "200":
              description: Customer's policies
      /my/policies/{policyNumber}/documents:
        get:
          summary: List available documents for a policy
          operationId: listPolicyDocuments
          parameters:
            - name: policyNumber
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Policy documents list
      /my/policies/{policyNumber}/changes:
        post:
          summary: Request a mid-term policy change
          operationId: requestPolicyChange
          parameters:
            - name: policyNumber
              in: path
              required: true
              schema:
                type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
          responses:
            "202":
              description: Change request accepted
      /my/claims:
        get:
          summary: List all claims for the authenticated customer
          operationId: listMyClaims
          responses:
            "200":
              description: Customer's claims

