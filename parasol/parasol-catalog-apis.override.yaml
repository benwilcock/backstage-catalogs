---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: premium-payment-api
  title: Premium Payment API
  description: |
    Accepts premium payments from the customer web portal, mobile app,
    and third-party payment integrations. Supports card, direct debit
    setup, and Open Banking account-to-account payments.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/payment-gateway-service
  tags:
    - billing
    - payments
    - public-api
    - pci-dss
spec:
  type: openapi
  lifecycle: production
  owner: group:default/billing-payments-engineering
  system: payment-processing-system
  definition: |
    openapi: "3.0.3"
    info:
      title: Premium Payment API
      version: "2.3.0"
      description: Accepts premium payments via multiple payment methods.
    servers:
      - url: https://api.parasol.com/billing/payments/v2
    paths:
      /payments:
        post:
          summary: Submit a premium payment
          operationId: submitPayment
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/PaymentRequest"
          responses:
            "202":
              description: Payment accepted for processing
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/PaymentAcknowledgement"
            "402":
              description: Payment declined
      /payments/{paymentId}:
        get:
          summary: Retrieve payment status
          operationId: getPaymentStatus
          parameters:
            - name: paymentId
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Payment status details
      /billing-accounts/{accountId}/balance:
        get:
          summary: Retrieve current billing account balance
          operationId: getBillingBalance
          parameters:
            - name: accountId
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Account balance and next payment details
    components:
      schemas:
        PaymentRequest:
          type: object
          required: [policyNumber, amount, paymentMethod]
          properties:
            policyNumber:
              type: string
            amount:
              type: number
            currency:
              type: string
              default: GBP
            paymentMethod:
              type: string
              enum: [CARD, DIRECT_DEBIT, OPEN_BANKING]
            paymentToken:
              type: string
        PaymentAcknowledgement:
          type: object
          properties:
            paymentId:
              type: string
            status:
              type: string
              enum: [PENDING, AUTHORISED, SETTLED, FAILED]
            authCode:
              type: string

