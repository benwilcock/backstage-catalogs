---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: policy-lookup-api-gateway
  title: Policy Lookup API Gateway
  description: |
    Exposes a secure, rate-limited policy lookup API consumed by all internal
    systems and authorised third parties including loss adjusters and broker
