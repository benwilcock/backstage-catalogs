  system: policy-lifecycle-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: policy-event-streaming-service
  title: Policy Event Streaming Service
  description: |
    Publishes all policy lifecycle domain events (incepted, endorsed, renewed,
    cancelled, lapsed) to the enterprise event bus. Downstream consumers
    include billing, reinsurance, data lake, and regulatory reporting. Ensures
    at-least-once delivery with idempotent consumer support.
