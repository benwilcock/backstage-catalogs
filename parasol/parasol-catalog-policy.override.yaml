# CANCELLATION & REINSTATEMENT SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: cancellation-processing-service
  title: Cancellation Processing Service
  description: |
    Processes voluntary and involuntary policy cancellations. Validates
    statutory notice periods, calculates return premium on short-rate or
    pro-rata basis, updates the policy record to cancelled status, and
    triggers billing adjustments and cancellation notice generation.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/cancellation-processing-service
  tags:
    - policy
    - cancellation
    - compliance
    - java
    - rest
