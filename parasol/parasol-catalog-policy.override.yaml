# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: policy-search-index-service
  title: Policy Search Index Service
  description: |
    Maintains a real-time Elasticsearch search index of all policies across
    all lines of business. Indexes policy number, policyholder name, address,
    vehicle registration, and property postcode to enable sub-second lookups
    by the call centre, claims intake, and broker portal.
  annotations:
