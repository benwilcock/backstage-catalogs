      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/policy-platform-engineering
  system: cancellation-reinstatement-system
  dependsOn:
    - component:default/pro-rata-adjustment-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: lapse-management-service
  title: Lapse Management Service
  description: |
    Monitors policies for non-payment of premium and manages the lapse
    workflow including grace period tracking, final demand notices, and
    policy lapse recording. Coordinates with the billing system to determine
    when a policy should be lapsed versus referred for reinstatement.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/lapse-management-service
  tags:
    - policy
    - cancellation
    - billing
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/POLICY/lapse-management-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/lapse-management-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/policy-platform-engineering
  system: cancellation-reinstatement-system
  dependsOn:
    - component:default/arrears-tracking-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: reinstatement-eligibility-service
  title: Reinstatement Eligibility Service
  description: |
    Assesses whether a lapsed policy is eligible for reinstatement based
    on time since lapse, payment of outstanding arrears, and underwriting
    criteria. Prevents reinstatement where a loss event has occurred during
    the lapse period or where the risk profile has materially changed.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/reinstatement-eligibility-service
  tags:
    - policy
    - cancellation
