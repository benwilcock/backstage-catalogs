  owner: group:default/policy-platform-engineering
  system: policy-lifecycle-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: named-insured-service
  title: Named Insured & Party Service
  description: |
    Manages the insured party records attached to a policy including
    policyholder, named insureds, additional insureds, loss payees, and
    mortgagees. Maintains a deduplicated customer identity across all
    policies using master data management linkage.
  annotations:
