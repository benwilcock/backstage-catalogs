# Parasol Insurance -- Policy Administration & Billing/Payments Domain Components
#
# Covers all microservices in:
#   policy-administration: policy-lifecycle-system, policy-search-system,
#                          policy-document-system, cancellation-reinstatement-system
#   billing-payments:      premium-collection-system, payment-processing-system,
#                          refunds-adjustments-system, billing-account-system

# ===========================================================================
# POLICY LIFECYCLE SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: policy-inception-service
  title: Policy Inception Service
  description: |
    Creates new policy records in the system of record when a risk is bound.
    Assigns unique policy numbers, captures coverage terms, stores insured
    details, and broadcasts a PolicyIncepted event to downstream systems
    including billing, document, and reinsurance platforms.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/policy-inception-service
  tags:
    - policy
    - lifecycle
    - java
    - rest
    - event-driven
  links:
    - url: https://confluence.parasol.com/display/POLICY/policy-inception-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/policy-inception-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/policy-platform-engineering
  system: policy-lifecycle-system
  dependsOn:
    - component:default/policy-coverage-query-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: policy-coverage-query-service
  title: Policy Coverage Query Service
  description: |
    Provides real-time read access to active policy coverage details for
    consuming services across the business. Used by claims intake to verify
    coverage, by billing to retrieve premium schedules, and by the customer
    portal to display policy information to policyholders.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/policy-coverage-query-service
  tags:
    - policy
    - lifecycle
    - java
    - rest
    - cqrs
  links:
    - url: https://confluence.parasol.com/display/POLICY/policy-coverage-query-service
