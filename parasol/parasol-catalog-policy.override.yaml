      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/policy-platform-engineering
  system: policy-lifecycle-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: policy-version-control-service
  title: Policy Version Control Service
  description: |
    Maintains a complete audit-ready version history of every policy record.
    Every change (endorsement, renewal, address update) creates a new
    immutable version, enabling point-in-time policy reconstruction for
    claims, regulatory audit, and litigation purposes.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/policy-version-control-service
  tags:
    - policy
