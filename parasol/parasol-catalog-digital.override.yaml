---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: delegated-authority-management-service
  title: Delegated Authority Management Service
  description: |
    Manages binding authority agreements between Parasol and coverholders.
    Records facility terms, product classes, geographic restrictions,
