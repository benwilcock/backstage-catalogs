      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/digital-channels-engineering
  system: web-portal-system
  dependsOn:
    - component:default/endorsement-request-service
    - component:default/policy-document-delivery-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: customer-identity-service
  title: Customer Identity Service
  description: |
    Manages customer authentication and identity for the web portal and
    mobile app. Supports password, social login, and biometric authentication.
    Integrates with the enterprise IAM platform for single sign-on and
    provides multi-factor authentication for sensitive policy changes.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/customer-identity-service
  tags:
    - customer-portal
    - identity
    - security
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/DIGITAL/customer-identity-service
