---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: broker-commission-service
  title: Broker Commission Service
  description: |
    Calculates and tracks brokerage commission for new business, endorsements,
    and renewals. Manages delegated authority binding limits, commission
