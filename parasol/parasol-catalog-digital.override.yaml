    - url: https://github.parasol.com/parasol/customer-identity-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/digital-channels-engineering
  system: web-portal-system
  dependsOn:
    - component:default/iam-token-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: secure-messaging-service
  title: Secure Messaging Service
  description: |
    Provides an in-portal secure messaging channel between customers and
    the Parasol service centre. Manages message threading, read receipts,
    file attachment handling, and SLA tracking for response time compliance.
    Messages are archived for regulatory correspondence retention.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/secure-messaging-service
  tags:
    - customer-portal
