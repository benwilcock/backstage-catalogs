---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: push-notification-service
  title: Push Notification Service
  description: |
    Delivers push notifications to Parasol mobile app users for claim status
    updates, payment reminders, renewal invitations, and policy change
    confirmations. Integrates with Apple APNs and Google FCM, tracks delivery
    status, and handles opt-out preferences.
