---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: roadside-assistance-service
  title: Roadside Assistance Service
  description: |
    Allows policyholders to request breakdown and roadside assistance via
    the Parasol mobile app. Captures GPS location, dispatches to the
    assistance network provider (AA/RAC partnership), provides real-time
    ETA updates, and tracks the assistance event against the policy.
