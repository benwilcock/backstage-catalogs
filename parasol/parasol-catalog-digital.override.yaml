---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: mobile-fnol-photo-service
  title: Mobile FNOL Photo Capture Service
  description: |
    Receives vehicle damage photographs captured via the Parasol mobile app
    at the scene of an accident. Performs metadata extraction, GPS coordinate
    capture, timestamp validation, and forwards images to the claim document
    capture service tagged to the relevant FNOL submission.
  annotations:
