# Parasol Insurance -- Customer Portal & Reinsurance Domain Components
#
# Covers all microservices in:
#   customer-portal: web-portal-system, mobile-app-system, broker-portal-system
#   reinsurance:     treaty-management-system, facultative-placement-system,
#                    bordereau-reporting-system

# ===========================================================================
# WEB PORTAL SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: customer-portal-bff-service
  title: Customer Portal Backend-for-Frontend Service
  description: |
    Backend-for-frontend (BFF) service aggregating data from multiple
    domain APIs to serve the my.parasol.com customer web portal. Handles
    session management, permission filtering, and request orchestration
    to provide optimised API responses for each portal page.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/customer-portal-bff-service
  tags:
    - customer-portal
    - web
    - bff
    - nodejs
    - rest
  links:
    - url: https://confluence.parasol.com/display/DIGITAL/customer-portal-bff-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/customer-portal-bff-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/digital-channels-engineering
  system: web-portal-system
  dependsOn:
    - component:default/policy-coverage-query-service
    - component:default/billing-account-ledger-service
    - component:default/customer-identity-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: customer-self-service-api
  title: Customer Self-Service API
  description: |
    Exposes policy management self-service capabilities to authenticated
    customers via the web portal and mobile app. Supports address updates,
    named driver amendments, direct debit changes, and document download
    requests, routing each action through the appropriate domain service.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/customer-self-service-api
  tags:
    - customer-portal
    - web
    - api
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/DIGITAL/customer-self-service-api
