# ===========================================================================
# TREATY MANAGEMENT SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: treaty-structure-service
  title: Treaty Structure Service
  description: |
    Maintains the structure and terms of all outward reinsurance treaty
    arrangements. Records treaty layers, limits, retentions, reinsurer
    shares, and participation percentages. Provides treaty lookup for
    cession calculations and premium/loss allocation.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/treaty-structure-service
  tags:
    - reinsurance
    - treaty
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/REINS/treaty-structure-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/treaty-structure-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/reinsurance-engineering
  system: treaty-management-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: reinsurance-cession-service
  title: Reinsurance Cession Service
  description: |
    Calculates and records reinsurance cessions for each in-force policy
    against applicable treaty structures. Produces ceded premium and ceded
    reserves entries consumed by the actuarial and finance reporting systems.
    Handles complex multi-treaty arrangements and order-of-recovery logic.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/reinsurance-cession-service
  tags:
    - reinsurance
    - treaty
    - finance
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/REINS/reinsurance-cession-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/reinsurance-cession-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/reinsurance-engineering
  system: treaty-management-system
  dependsOn:
    - component:default/treaty-structure-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: reinsurer-counterparty-service
  title: Reinsurer Counterparty Service
  description: |
    Manages the Parasol reinsurer counterparty register. Maintains reinsurer
    credit ratings, authorised territories, contact details, and treaty
    participation records. Triggers credit limit reviews when reinsurer
    ratings are downgraded below Parasol's minimum security threshold.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/reinsurer-counterparty-service
  tags:
    - reinsurance
    - treaty
    - counterparty
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/REINS/reinsurer-counterparty-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/reinsurer-counterparty-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/reinsurance-engineering
  system: treaty-management-system

# ===========================================================================
# FACULTATIVE PLACEMENT SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: facultative-submission-service
  title: Facultative Submission Service
  description: |
    Creates and manages facultative reinsurance submissions for individual
    risks that exceed automatic binding limits. Packages risk data and
    underwrites a proposed cession, distributes to market reinsurers,
    and tracks acceptance responses and partial placements.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/facultative-submission-service
  tags:
    - reinsurance
    - facultative
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/REINS/facultative-submission-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/facultative-submission-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/reinsurance-engineering
  system: facultative-placement-system

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: fac-placement-tracker
  title: Facultative Placement Tracker
  description: |
    Tracks the status of open facultative placements. Monitors placement
    percentage, identifies under-placed or unplaced risks approaching
    inception dates, and escalates to the reinsurance team. Ensures Parasol
    does not bind a risk without sufficient reinsurance protection in place.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/fac-placement-tracker
  tags:
    - reinsurance
    - facultative
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/REINS/fac-placement-tracker
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/fac-placement-tracker
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/reinsurance-engineering
  system: facultative-placement-system
  dependsOn:
    - component:default/facultative-submission-service

# ===========================================================================
# BORDEREAU REPORTING SYSTEM
# ===========================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: premium-bordereau-service
  title: Premium Bordereau Service
  description: |
    Generates monthly and quarterly premium bordereau reports for treaty
    reinsurers. Extracts ceded premium data by treaty layer, formats to
    reinsurer-specific templates, and distributes via secure file transfer.
    Tracks bordereau submission deadlines and acknowledgements.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/premium-bordereau-service
  tags:
    - reinsurance
    - bordereau
    - reporting
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/REINS/premium-bordereau-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/premium-bordereau-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/reinsurance-engineering
  system: bordereau-reporting-system
  dependsOn:
    - component:default/reinsurance-cession-service

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: loss-bordereau-service
  title: Loss Bordereau Service
  description: |
    Generates loss bordereau and large loss notifications for reinsurers.
    Extracts ceded claims data, applies treaty notification thresholds, and
    produces loss statements with reserve movements. Manages cash call
    processing when ceded reserves trigger reinsurer cash calls.
  annotations:
    backstage.io/source-location: url:https://github.parasol.com/parasol/loss-bordereau-service
  tags:
    - reinsurance
    - bordereau
    - claims
    - reporting
    - java
    - rest
  links:
    - url: https://confluence.parasol.com/display/REINS/loss-bordereau-service
      title: Internal Confluence Docs
      icon: docs
    - url: https://github.parasol.com/parasol/loss-bordereau-service
      title: Source Code
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/reinsurance-engineering
  system: bordereau-reporting-system
  dependsOn:
    - component:default/reinsurance-cession-service
    - component:default/claims-reserve-calculator

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: reinsurance-accounting-service
  title: Reinsurance Accounting Service
  description: |
    Manages reinsurance accounting balances with counterparties. Produces
    quarterly account current statements, tracks net balance positions,
    and initiates settlement payments. Interfaces with the general ledger
    for reinsurance debtor/creditor postings.
