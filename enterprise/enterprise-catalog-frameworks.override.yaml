# Enterprise Software Catalog - Application Development Frameworks
# 15 frameworks across 3 systems covering backend, frontend, and low-code tiers.
# All projects are active with OSI-approved licences.
#
# Note: n8n was considered but uses the Sustainable Use Licence (not OSI-approved).
# Activepieces (MIT) is the equivalent open-source composition platform included here.

# =============================================================================
# BACKEND & MICROSERVICE FRAMEWORKS (7)
# =============================================================================

