    - url: https://github.com/getsops/sops#readme
      title: Documentation
      icon: docs
    - url: https://github.com/getsops/sops
      title: GitHub Repository
      icon: github
spec:
  type: tool
  lifecycle: production
  owner: group:default/security-operations
  system: secret-management

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: bank-vaults
  title: Bank-Vaults
  description: |
    A set of tools for managing HashiCorp Vault and OpenBao on Kubernetes.
    Bank-Vaults provides a Kubernetes operator, CLI, SDK, and webhook mutator
    for seamless secret injection into pods.
  annotations:
    github.com/project-slug: bank-vaults/bank-vaults
    backstage.io/source-location: url:https://github.com/bank-vaults/bank-vaults
  tags:
    - secrets
