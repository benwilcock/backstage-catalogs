      title: GitHub Repository
      icon: github
    - url: https://external-secrets.io/
      title: Website
      icon: web
spec:
  type: service
  lifecycle: production
  owner: group:default/security-operations
  system: secret-management
  dependsOn:
    - component:default/kubernetes

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: sops
  title: SOPS
  description: |
    Simple and flexible tool for managing secrets. SOPS encrypts files using
    AWS KMS, GCP KMS, Azure Key Vault, age, and PGP while preserving the
    file format (YAML, JSON, ENV, INI). Ideal for GitOps secret management.
  annotations:
    github.com/project-slug: getsops/sops
    backstage.io/source-location: url:https://github.com/getsops/sops
  tags:
    - secrets
