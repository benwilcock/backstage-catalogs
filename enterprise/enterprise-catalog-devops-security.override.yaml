---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: openbao
  title: OpenBao
  description: |
    An open source fork of HashiCorp Vault, maintained by the Linux Foundation.
    OpenBao provides secrets management, encryption as a service, and
    identity-based access under a permissive MPL-2.0 license.
  annotations:
    github.com/project-slug: openbao/openbao
    backstage.io/source-location: url:https://github.com/openbao/openbao
  tags:
