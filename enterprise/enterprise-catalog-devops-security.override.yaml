      title: GitHub Repository
      icon: github
    - url: https://openbao.org/
      title: Website
      icon: web
spec:
  type: service
  lifecycle: production
  owner: group:default/security-operations
  system: secret-management

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: sealed-secrets
  title: Sealed Secrets
  description: |
    A Kubernetes controller and CLI tool that encrypts secrets so they can be
    safely stored in Git repositories. Only the controller running in the
    cluster can decrypt the sealed secrets back into regular Kubernetes Secrets.
  annotations:
    github.com/project-slug: bitnami-labs/sealed-secrets
    backstage.io/source-location: url:https://github.com/bitnami-labs/sealed-secrets
  tags:
    - secrets
    - kubernetes
    - gitops
    - encryption
    - go
  links:
    - url: https://github.com/bitnami-labs/sealed-secrets#readme
      title: Documentation
      icon: docs
    - url: https://github.com/bitnami-labs/sealed-secrets
      title: GitHub Repository
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/security-operations
  system: secret-management
  dependsOn:
    - component:default/kubernetes

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: external-secrets-operator
  title: External Secrets Operator
  description: |
    A Kubernetes operator that integrates external secret management systems
    (AWS Secrets Manager, Azure Key Vault, Google Secret Manager, HashiCorp
    Vault, etc.) into Kubernetes as native Secret resources.
  annotations:
    github.com/project-slug: external-secrets/external-secrets
    backstage.io/source-location: url:https://github.com/external-secrets/external-secrets
  tags:
