# Enterprise Software Catalog - Foundations
# Groups, Domains, and Systems for organizing ~140 enterprise open-source components.
# All projects are active and use OSI-approved licenses.

# =============================================================================
# GROUPS - Fictional enterprise teams that own catalog components
# =============================================================================

apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: data-engineering
  title: Data Engineering
  description: Manages databases, data pipelines, ETL processes, and analytical platforms.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-engineering
  title: Platform Engineering
  description: Builds and maintains the internal developer platform, container orchestration, and shared infrastructure services.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: security-operations
  title: Security Operations
  description: Manages identity, access control, secrets, vulnerability scanning, and compliance policy enforcement.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: devops-team
  title: DevOps
  description: Owns CI/CD pipelines, GitOps workflows, artifact registries, and release engineering tooling.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: ai-ml-team
  title: AI & Machine Learning
  description: Operates ML platforms, model training infrastructure, inference servers, and AI tooling.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: application-development
  title: Application Development
  description: Develops enterprise applications, microservices, and APIs using modern frameworks and developer tools.
spec:
  type: team
  children: []

---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: infrastructure-team
  title: Infrastructure
  description: Manages storage systems, networking, infrastructure-as-code, and serverless platforms.
spec:
  type: team
  children: []

# =============================================================================
# DOMAINS - High-level enterprise capability areas
# =============================================================================

---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: data-management
  title: Data Management
  description: |
    Relational databases, NoSQL stores, key-value caches, time-series databases,
    graph databases, and vector databases for enterprise data persistence.
spec:
  owner: group:default/data-engineering

---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: event-streaming-messaging
  title: Event Streaming & Messaging
  description: |
    Message brokers and event streaming platforms for asynchronous communication,
    event-driven architectures, and real-time data pipelines.
spec:
  owner: group:default/platform-engineering

---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: search-analytics
  title: Search & Analytics
  description: |
    Full-text search engines, indexing libraries, and analytics platforms
    for enterprise search and data discovery.
spec:
  owner: group:default/data-engineering

---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: cloud-infrastructure
  title: Cloud Infrastructure
  description: |
    Container orchestration, service mesh, networking, storage systems,
    infrastructure-as-code, and serverless platforms.
spec:
  owner: group:default/platform-engineering

---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: api-management
  title: API Management
  description: |
    API gateways, ingress controllers, reverse proxies, and web servers
    for managing traffic flow and API lifecycle.
spec:
  owner: group:default/platform-engineering

---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: observability
  title: Observability
  description: |
    Monitoring, metrics collection, log aggregation, distributed tracing,
    and alerting for enterprise systems visibility.
spec:
  owner: group:default/platform-engineering

---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: cicd-devops
  title: CI/CD & DevOps
  description: |
    Continuous integration and delivery pipelines, GitOps tooling,
    source control, artifact registries, and developer productivity tools.
spec:
  owner: group:default/devops-team

---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: security-identity
  title: Security & Identity
  description: |
    Identity and access management, policy enforcement, secret management,
    vulnerability scanning, and supply chain security.
spec:
  owner: group:default/security-operations

---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: ai-machine-learning
  title: AI & Machine Learning
  description: |
    Machine learning platforms, model training infrastructure, inference servers,
    and AI development tooling.
spec:
  owner: group:default/ai-ml-team

---
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: data-engineering
  title: Data Engineering
  description: |
    Data processing frameworks, ETL pipelines, change data capture,
    workflow orchestration, and integration middleware.
spec:
  owner: group:default/data-engineering

