# Enterprise Software Catalog - API Entities
# 11 API entities with verified, publicly accessible OpenAPI specs.
# Definitions are fetched from raw upstream sources using Backstage $text substitution.
# All spec URLs are verified live as of March 2026.

# =============================================================================
# MONITORING & OBSERVABILITY APIs
# =============================================================================

apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: grafana-api
  title: Grafana HTTP API
  description: |
    The Grafana HTTP API enables programmatic management of dashboards,
    data sources, users, alerts, annotations, folders, and organisations.
    The spec is generated from Grafana source code using go-swagger.
  annotations:
    github.com/project-slug: grafana/grafana
    backstage.io/source-location: url:https://github.com/grafana/grafana
  tags:
    - monitoring
    - visualization
    - rest
    - openapi
  links:
    - url: https://grafana.com/docs/grafana/latest/developers/http_api/
      title: API Documentation
      icon: docs
    - url: https://github.com/grafana/grafana
      title: GitHub Repository
      icon: github
spec:
  type: openapi
  lifecycle: production
  owner: group:default/platform-engineering
  system: monitoring-metrics
  definition:
    $text: https://raw.githubusercontent.com/grafana/grafana/main/public/openapi3.json

